[pytest]
testpaths =
    tests/common
    tests/orchestrator
    tests/vista
python_files = test_*.py
norecursedirs =
    .git
    .pytest_cache
    __pycache__
    scripts
    examples
    manual
    legacy_tests
    hardware
    logs
    runs
    pids
    tmp
markers =
    hardware: requires physical robot hardware, camera devices, board-only binaries, or sensors
    integration: crosses process, IPC, service, or external subsystem boundaries
    manual: operator-run scripts and manual diagnostics
    slow: intentionally long-running tests
