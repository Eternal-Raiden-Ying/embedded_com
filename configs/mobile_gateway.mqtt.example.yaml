robot_id: SC171
backend: orchestrator_tcp

runtime:
  mode: production
  log_level: INFO
  heartbeat_period_s: 1.0
  heartbeat_log_interval_s: 30
  suppress_heartbeat_success_log: true
  enable_raw_mqtt_debug: false
  enable_legacy_command_compat: true
  cmd_dedup_cache_size: 64

mqtt:
  enabled: false
  transport: websocket
  use_tls: true
  broker_host: your-broker-domain.com
  broker_port: 443
  websocket_path: /mqtt
  username: ""
  password: ""
  client_id: "sc171_car_01"
  cmd_qos: 1
  ack_qos: 1
  status_qos: 0
  heartbeat_qos: 0
  retain_status: true
  retain_heartbeat: false
  topics:
    cmd: "robot/v1/SC171/mobile/cmd"
    ack: "robot/v1/SC171/mobile/ack"
    status: "robot/v1/SC171/mobile/status"
    heartbeat: "robot/v1/SC171/heartbeat"

orchestrator:
  task_cmd_socket_path: "/tmp/robot_stack/task_cmd.sock"
  task_ack_socket_path: "/tmp/robot_stack/task_ack.sock"
  state_blocks_path: ""
  state_block_log_mode: "summary"  # summary / full / disabled
  state_block_log_period_s: 1.0

mobile_gateway:
  cmd_in_socket_path: "/tmp/robot_stack/mobile_gateway_cmd.sock"
  status_out_socket_path: "/tmp/robot_stack/mobile_gateway_status.sock"
