robot_id: SC171
backend: orchestrator_tcp

runtime:
  mode: production
  log_level: INFO
  heartbeat_period_s: 1.0
  heartbeat_log_interval_s: 30
  suppress_heartbeat_success_log: true
  enable_raw_mqtt_debug: false
  enable_legacy_command_compat: true
  cmd_dedup_cache_size: 64

mqtt:
  enabled: false
  transport: websocket
  use_tls: true
  broker_host: your-broker-domain.com
  broker_port: 443
  websocket_path: /mqtt
  username: ""
  password: ""
  client_id: "sc171_car_01"
  cmd_qos: 1
  ack_qos: 1
  status_qos: 0
  heartbeat_qos: 0
  retain_status: true
  retain_heartbeat: false
  topics:
    cmd: "robot/v1/SC171/mobile/cmd"
    ack: "robot/v1/SC171/mobile/ack"
    status: "robot/v1/SC171/mobile/status"
    heartbeat: "robot/v1/SC171/heartbeat"

orchestrator:
  task_cmd_host: "127.0.0.1"
  task_cmd_port: 9001
  task_ack_host: "127.0.0.1"
  task_ack_port: 9012
  state_blocks_path: ""

mobile_gateway:
  cmd_in_host: "127.0.0.1"
  cmd_in_port: 9101
  status_out_host: "127.0.0.1"
  status_out_port: 9102
