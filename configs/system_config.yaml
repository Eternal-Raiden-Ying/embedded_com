    hard_stale_stop_ms: 800 # Emergency stop watchdog safety timeout
    soft_stale_hold_enable: true # Preserve last command on small gaps
    max_vx_mps: 1.0 # Absolute forward speed limit
    max_vy_mps: 1.0 # Absolute lateral speed limit
    max_wz_radps: 1.0 # Absolute rotation speed limit
    stm32_wheel_speed_limit: 100 # Hardware limit for wheel speed
    stm32_vx_scale: 100.0 # Scaling divisor for forward velocity
    stm32_vy_scale: 100.0 # Scaling divisor for lateral velocity
    stm32_wz_scale: 100.0 # Scaling divisor for rotation velocity
    jog_forward_speed: 0.02 # Forward step velocity for manual jog
    jog_turn_speed: 0.05 # Rotation step velocity for manual jog
    jog_duration_ms: 100 # Duration of manual jog command
    stop_on_state_enter: false # Send stop command when entering states
    mode_line_on_change: true # Write mode change message to serial logs
    mode_line_every_cmd: false # Write mode message on every packet
    serial_float_digits: 3 # Float serialization decimal precision
  docking:
    min_confidence: 0.55 # Minimum detection confidence for docking control
    obs_timeout_s: 0.35 # Observation packet age limit
    dt_min_s: 0.02 # Minimum sampling interval for PID updates
    reset_on_mode_change: true # Reset PID integrals on mode transitions
    coarse_align_enter_rad: 0.18 # Enter coarse align heading error limit
    coarse_align_exit_rad: 0.08 # Exit coarse align heading error limit
    spin_only_yaw_rad: 0.18 # Heading error to pause forward motion
    precise_yaw_tol_rad: 0.025 # Heading error stop precision tolerance
    precise_dist_tol_m: 0.015 # Distance error stop precision tolerance
    precise_lateral_tol_m: 0.015 # Lateral error stop precision tolerance
    precise_stable_s: 0.50 # Settle time to confirm docking complete
    coarse_max_wz_radps: 0.45 # Max coarse align angular speed
    approach_max_vx_mps: 0.28 # Max approach forward speed
    approach_max_vy_mps: 0.18 # Max approach lateral speed
    approach_max_wz_radps: 0.32 # Max approach angular speed
    final_max_vx_mps: 0.12 # Max docking forward speed
    final_max_vy_mps: 0.12 # Max docking lateral speed
    final_max_wz_radps: 0.18 # Max docking angular speed
    vx_slew_per_s: 0.80 # Forward acceleration limit in docking
    vy_slew_per_s: 0.80 # Lateral acceleration limit in docking
    wz_slew_per_s: 1.20 # Angular acceleration limit in docking
    enable_lateral_control: true # Enable side adjustments during docking
    yaw_pid:
      kp: 1.8 # Proportional gain
      ki: 0.02 # Integral gain
      kd: 0.10 # Derivative gain
