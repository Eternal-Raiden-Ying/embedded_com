    fallback_dead_zone_x: 0.10 # Horizontal alignment deadband
    fallback_spin_only_x_th: 0.82 # Lateral error that triggers pure rotation
    fallback_forward_align_exp: 2.0 # Scaling exponent for fallback velocity
    table_fov_soft_th: 0.25 # FOV limit warning
    table_fov_hard_th: 0.40 # FOV limit threshold
    table_view_memory_ttl_s: 0.80 # Bbox position tracking memory TTL
