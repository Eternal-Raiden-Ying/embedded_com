      output_limit: 0.80 # Output speed limit
      derivative_alpha: 0.35 # Derivative filter constant
      deadband: 0.010 # Control deadband
      min_abs_output: 0.06 # Minimum starting output speed
    dist_pid:
      kp: 1.4 # Proportional gain
      ki: 0.03 # Integral gain
      kd: 0.08 # Derivative gain
      integral_limit: 0.35 # Integral windup limit
      output_limit: 0.40 # Output speed limit
      derivative_alpha: 0.30 # Derivative filter constant
      deadband: 0.004 # Control deadband
      min_abs_output: 0.04 # Minimum starting output speed
    lateral_pid:
      kp: 1.2 # Proportional gain
      ki: 0.02 # Integral gain
      kd: 0.08 # Derivative gain
      integral_limit: 0.30 # Integral windup limit
      output_limit: 0.30 # Output speed limit
      derivative_alpha: 0.30 # Derivative filter constant
      deadband: 0.004 # Control deadband
      min_abs_output: 0.04 # Minimum starting output speed
  task_cmd_in:
    transport: "tcp" # Task cmd input channel mode
