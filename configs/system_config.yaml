### === Layered Configuration Entry Point === ###
# Merge order:
#   1. schema dataclass defaults in common/config/schema.py
#   2. defaults below
#   3. project config sections in this file
#   4. configs/profiles/<profile>.yaml
#   5. runtime_overrides below
#   6. environment variables
profile: "windows_dev"
defaults:
  orchestrator:
    runtime:
      stage_params_file: "orchestrator/configs/stage_params.yaml"
      car_cmd_params_file: "orchestrator/configs/car_cmd_params.yaml"
    serial:
      dry_run: true
runtime_overrides:
  orchestrator:
    runtime:
      stage_params_file: "orchestrator/configs/stage_params.yaml"
      car_cmd_params_file: "orchestrator/configs/car_cmd_params.yaml"

### === Vision Module Configuration === ###
vision:
  runtime:
    project_root: "" # Root directory of vision project
    log_dir: "" # Directory where log files are stored
    log_file: "" # Path to the active log file
    runs_dir: "" # Runs output directory
    pid_dir: "" # PID file directory
    pid_file: "" # PID file path
    vision_params_file: "" # Path to runtime configuration file
    loaded_config_files: [] # List of loaded config paths
    stack_run_id: "" # Stack run execution ID
    loop_hz: 8.0 # Frequency of main perception loop
    send_hz: 5.0 # IPC send frequency
    track_local_send_hz: 8.0 # Local tracking IPC send frequency
    stale_req_s: 3.0 # Duration to consider incoming request stale
    hot_standby_s: 30.0 # Hot standby timeout duration
    keep_preview_after_stop: true # Keep debug preview active after stop
    keep_model_hot_in_standby: true # Keep YOLO model in memory during standby
    enable_infer_during_hot_standby: false # Run inference in standby
    capability_placeholder: false # Capability sink indicator
    heartbeat_enabled: false # Heartbeat message enabled
    heartbeat_interval_s: 5.0 # Heartbeat message interval
    heartbeat_console: false # Enable console logging for heartbeat
    console_mode: "operator" # Mode for console interface
    operator_summary_interval_s: 1.0 # Operator summary log interval
    ipc_console: false # Allow control console over IPC
    log_mode: "concise" # Logging details mode
    log_enabled: true # Enable/disable logging
    debug: false # Debug flag
  camera:
    streams:
      rgb:
        source: "6" # Camera identifier for rgb stream
        in_w: 1280 # Input frame width
        in_h: 720 # Input frame height
        out_w: 640 # Output processed width
        out_h: 640 # Output processed height
        in_format: "YUY2" # Video format from camera
        format: "BGR" # Color space target
        fps: 30 # Frame rate
        crop_x: 280 # Horizontal crop start pixel
        crop_y: 0 # Vertical crop start pixel
        crop_w: 720 # Crop width
        crop_h: 720 # Crop height
        enable: true # Stream enabled status
        auto_exposure: true # Enable auto exposure
        exposure: null # Fixed exposure value if auto is false
        brightness: null # Camera brightness level
      depth:
        source: "2" # Camera identifier for depth stream
        height: 240 # Depth frame height
        width: 424 # Depth frame width
        fps: 15 # Depth frame rate
        enable: false # Depth stream enabled status
      grey:
        source: "4" # Camera identifier for IR stream
        in_w: 640 # Input IR width
        in_h: 480 # Input IR height
        out_w: 640 # Output IR width
        out_h: 480 # Output IR height
        in_format: "GRAY8" # Input IR format
        format: "BGR" # Target color space
        fps: 30 # IR frame rate
        crop_x: 0 # Horizontal crop offset
        crop_y: 0 # Vertical crop offset
        crop_w: 0 # Crop width
        crop_h: 0 # Crop height
        enable: false # IR stream enabled status
    max_fps: 30 # System wide camera frame rate limit
  model:
    active_model: "yolo26s_detect" # YOLO model identifier currently active
    profiles: {} # Predefined YOLO profiling targets
    enable_yolo26: true # Enable YOLO26 custom detector
    enable_yolo_table_search: false # Enable YOLO based table search task
  debug:
    preview: false # GUI display window active
    draw_boxes: true # Draw YOLO bounding boxes on frames
    draw_masks: false # Draw segmentation masks on frames
    edge_debug_enabled: false # Print edge detector debug trace
    edge_debug_period_s: 1.0 # Edge debug print period
    table_det_enabled: false # YOLO table detection print active
    table_det_min_conf: 0.25 # Table detection minimum confidence
    table_det_center_tol: 0.12 # Center alignment tolerance
    table_bbox_enabled: true # Enable bbox overlay
    mock_table_bbox: "" # Hardcoded mock bbox coordinates
  table_edge:
    roi_preset: "" # ROI preset coordinate profiles
    yolo_table_roi_enable: true # Scale ROI from YOLO bounding box
    yolo_table_class_id: 0 # YOLO class id corresponding to table
    yolo_table_conf_min: 0.25 # Minimum confidence to trust table bbox
    yolo_table_roi_use_rgb_depth_mapping: true # Apply FOV mapping coordinates
    yolo_table_roi_mode: "centered_bbox_scale" # Bounding box extraction strategy
    yolo_table_roi_scale_x: 0.50 # Horizontal scale factor for ROI
    yolo_table_roi_scale_y: 0.50 # Vertical scale factor for ROI
    rgb_depth_mapping_mode: "centered_scale" # FOV scale conversion mode
    rgb_fov_in_depth_scale_x: 0.75 # RGB relative horizontal FOV ratio
    rgb_fov_in_depth_scale_y: 0.75 # RGB relative vertical FOV ratio
    rgb_depth_center_offset_x: 0.0 # Center offset correction in pixels
    rgb_depth_center_offset_y: 0.0 # Center offset correction in pixels
    yolo_table_bbox_hold_enable: true # Hold previous bbox upon detection loss
    yolo_table_bbox_hold_frames: 8 # Number of frames to hold bbox history
    yolo_table_roi_hold_enable: true # Persist ROI to avoid frame gaps
    yolo_table_roi_boundary_extend_enable: true # Extend ROI to edge if boundary is reached
    yolo_table_roi_boundary_margin_norm: 0.03 # Margin to trigger extension
    yolo_table_edge_stable_frames: 5 # Frames to confirm stable edge detection
    edge_trusted_min_conf: 0.60 # Minimum confidence for control alignment
    edge_trusted_max_residual: 0.0 # Residual threshold (0 to disable)
    edge_trusted_min_support_count: 0 # Minimum points supporting fit line
    edge_trusted_min_inlier_count: 0 # Minimum inliers required for fit
    edge_trusted_min_x_span_m: 0.0 # Minimum lateral line size
    edge_trusted_max_background_penalty: 0.0 # Background penalty gate limit
    yolo_table_near_dist_m: 0.45 # Threshold to categorize table as near
    yolo_table_near_bottom_norm: 0.60 # Normalized y value boundary for near
    profile_log_interval_s: 2.0 # Log processing profiles rate
    save_debug_frames: false # Save frame image captures to disk
    target_hz: 10.0 # Target rate of edge detector execution
    preview_hz: 2.0 # Debug layout rendering frequency
    fast_debug_pixels: true # Store point cloud coordinate maps in debug logs
    fast_debug_pixels_online: false # Collect pixels during active runs
    fast_debug_pixels_offline: true # Save debug pixels for offline replays
    fast_debug_pixel_cap: 300 # Limit maximum debug points saved
    fast_candidate_point_cap: 1800 # Cap input raw points
    fast_front_edge_col_step: 2 # Column stride for edge search
    fast_front_edge_row_step: 2 # Row stride for edge search
    depth_stride: 2 # Column and row downsample stride for fast plane depth map
    detector_mode: "lightweight" # Perception process mode: lightweight, full, fast_plane_only
    update_hz: 5.0 # Perception thread loop frequency
    light_stride: 4 # Processing step for lightweight mode
    fast_plane_stride: 4 # Processing step for fast plane mode
    require_yolo_confirm: true # Block edge perception if YOLO has no table bbox
    static_roi_enabled: false # Use static fallback ROI instead of dynamic YOLO ROI
    camera_pitch_deg: 15.0 # Pitch angle of camera in degrees
    camera_height_m: 0.70 # Height of camera optical center from ground
    camera_roll_deg: 0.0 # Roll angle of camera in degrees
    camera_yaw_deg: 0.0 # Yaw angle of camera in degrees
    table_height_m: 0.40 # Ground truth table height in meters
    front_face_z_min_m: 0.03 # Minimum Z to consider front table face
    front_face_z_max_m: 0.43 # Maximum Z to consider front table face
    min_vertical_z_span_m: 0.12 # Minimum vertical size to filter background
    min_vertical_support_points: 3 # Minimum height profile support points
    x_bin_width_m: 0.04 # Grid resolution for birdview clustering
    y_cluster_bin_m: 0.04 # Bin size for cluster extraction
    min_front_face_columns: 3 # Minimum horizontal columns representing edge
    min_front_face_x_span_m: 0.07 # Minimum horizontal span of the edge
    front_cluster_gap_m: 0.10 # Gap to segment separate tables/objects
    max_yaw_abs_rad: 0.75 # Heading error safety threshold
    enable_yolo_in_plane_only: false # Mask pixels using YOLO bbox
    yolo_table_min_conf: 0.25 # YOLO table confidence minimum threshold
  preview:
    mode_layouts:
      IDLE: "rgb_minimal" # Layout for IDLE state
      FIND_EDGE: "rgb_depth_edge" # Layout for FIND_EDGE state
      FIND_OBJECT: "rgb_yolo_edge_overlay" # Layout for FIND_OBJECT state
      MICRO_ADJUST: "rgb_minimal" # Layout for MICRO_ADJUST state
      GRASP_REMOTE: "rgb_depth_edge" # Layout for GRASP_REMOTE state
      IDLE_HOT: "rgb_hot_preview" # Layout for IDLE_HOT state
    debug_four_panel_in_track_local: false # Render 4 panel layout in local tracking
    show_edge_overlay_in_track_local: true # Draw detected edge markers
    show_age_ms: true # Display frame processing latency text
    clear_overlay_on_mode_switch: true # Erase overlay lines when mode changes
    scale: 1.0 # Display scaling factor
    canvas_w: 1280 # Rendering width
    canvas_h: 720 # Rendering height
    show_rgb: true # Render rgb streams
    show_depth: true # Render depth overlay
    show_edge: true # Render edge line fit overlays
    destroy_all_on_close: true # Close all OpenCV windows on exit
  mode_profiles: {} # Parameter adjustments per execution mode
  req_in:
    transport: "uds" # Incoming IPC channel mode
    ipc_socket_path: "" # Socket file path
  obs_out:
    transport: "uds" # Outgoing IPC channel mode
    ipc_socket_path: "" # Socket file path

### === Orchestrator Configuration === ###
orchestrator:
  runtime:
    project_root: "" # Root path of orchestrator stack
    log_dir: "" # Orchestrator logs folder
    log_file: "" # Active orchestrator log file
    runs_dir: "" # Task run histories directory
    pid_dir: "" # Folder for pid files
    pid_file: "" # Pid path
    stack_run_id: "" # Multi process stack execution identifier
    tick_hz: 10.0 # Orchestrator state machine update rate
    log_mode: "concise" # Level of details in stdout/file logs
    log_enabled: true # Enable orchestrator logs output
    debug: false # Debug level traces enabled
    state_block_period_s: 1.0 # State report publish period
    heartbeat_period_s: 1.0 # State machine heartbeat period
    stage_params_file: "orchestrator/configs/stage_params.yaml" # Dynamic state configuration override yaml
    car_cmd_params_file: "orchestrator/configs/car_cmd_params.yaml" # Velocity limits override yaml
    loaded_config_files: [] # List of config files loaded during boot
  serial:
    port: "/dev/ttyHS1" # Serial port device descriptor
    baudrate: 115200 # Baud rate for STM32 communication
    timeout_s: 0.10 # Read write timeout duration
    dry_run: false # Run serial port in mock mode
    readback_enabled: true # Read back echoed commands from STM32
    dry_run_echo_stdout: false # Write dry run outputs to console
    dry_run_echo_on_change_only: true # Output only when speed changes
    dry_run_echo_summary_period_s: 5.0 # Print speed summary period
    dry_run_quiet_idle_stop: true # Suppress log output when speed is zero
    uart_lowfreq_period_s: 5.0 # Frequency of status requests in sleep
    stm32_status_enabled: false # Periodically query STM32 hardware flags
    stm32_status_period_s: 1.0 # Query STM32 hardware status period
  control:
    cmd_confidence_th: 0.60 # Confidence threshold for aligning/docking
    target_obs_max_age_s: 1.00 # Max age of target tag observation
    table_obs_max_age_s: 1.00 # Max age of table edge observation
    home_obs_max_age_s: 1.00 # Max age of home tag observation
    search_table_timeout_s: 20.0 # Timeout for table bbox search phase
    approach_timeout_s: 14.0 # Timeout for table approach phase
    target_search_timeout_s: 10.0 # Timeout for target search phase
    return_search_timeout_s: 15.0 # Timeout for return trip tag search phase
    req_resend_period_s: 1.0 # Re-trigger command send rate
    table_found_frames_to_approach: 2 # Bbox frames to confirm and approach
    table_lost_frames_to_reacquire: 4 # Frames to transition from track to search
    table_loss_hold_s: 1.20 # Timeout to preserve last direction on table loss
    approach_min_dwell_s: 0.80 # Minimum duration in approach state
    table_approach_warmup_s: 2.0 # Warmup duration for approach filter
    table_approach_warmup_min_fresh_obs: 1 # Minimum observations to end warmup
    coarse_align_frames_to_advance: 2 # Stable frames to enter approach
    coarse_align_done_rad: 0.25 # Alignment angle error threshold
    align_to_approach_yaw_rad: 0.08 # Yaw tolerance to start moving forward
    approach_to_align_yaw_rad: 0.16 # Yaw error that forces realigning
    align_to_approach_stable_obs: 2 # Consistent obs required for forward
    approach_to_align_stable_obs: 2 # Consistent obs required for correction
    coarse_align_min_dwell_s: 0.80 # Minimum coarse align duration
    controlled_approach_min_dwell_s: 0.80 # Minimum controlled approach duration
    final_lock_frames_to_arrive: 3 # Frames of stable target to complete task
    final_lock_yaw_tol_rad: 0.25 # Heading error threshold for final stop
    final_lock_dist_tol_m: 0.03 # Forward distance error threshold for final stop
    final_lock_lateral_tol_m: 0.03 # Lateral alignment error threshold for final stop
    table_edge_only_test: false # Perceive table edge without active motion
    table_target_dist_m: 0.50 # Desired docking offset distance from table
    table_dist_tol_m: 0.05 # Distance tolerance for stopping
    table_yaw_tol_rad: 0.25 # Heading alignment tolerance for stopping
    table_stop_margin_m: 0.05 # Stop margin offset safety factor
    table_settle_s: 0.50 # Settle time after stopping
    table_stable_frames: 5 # Number of stable frames to declare stop ready
    yolo_table_control_enable: true # Utilize YOLO table detections
    yolo_table_conf_min: 0.25 # Trust threshold for YOLO table bbox
    yolo_table_edge_stable_frames: 5 # Frames to confirm table edge stability
    edge_trusted_stable_frames: 5 # Legacy alias of stable frames
    edge_trusted_min_conf: 0.60 # Minimum confidence for control gating
    edge_trusted_max_residual: 0.05 # Maximum fit residual tolerance
    edge_trusted_min_support_count: 0 # Minimum height profile support points
    edge_trusted_min_inlier_count: 0 # Minimum inlier points required
    edge_trusted_min_x_span_m: 0.0 # Minimum horizontal size of fit edge
    edge_trusted_max_background_penalty: 0.0 # Max background noise allowed
    yolo_table_near_dist_m: 0.45 # Lateral distance threshold for near stage
    yolo_table_lost_to_search_frames: 8 # Frame drop threshold to trigger search
    table_memory_timeout_sec: 3.0 # Maximum age of search with memory cache
    table_center_loss_hold_sec: 1.0 # Duration to keep rotating in center direction
    rotate_search_timeout_s: 10.0 # Timeout for blind rotate search
    rotate_require_edge_stable_frames: 5 # Stable frames to reacquire table
    rotate_yaw_threshold_rad: 0.20 # Align error threshold during rotation
    yolo_edge_conflict_block_rotate: true # Do not spin if edge/YOLO disagree
    final_lock_required_ready_obs: 3 # Target observations before lock
    final_lock_window_ms: 1000 # Time window for target updates
    final_lock_max_consecutive_lost: 2 # Allowed consecutive lost target frames
    final_lock_soft_stale_hold: true # Keep command active on brief loss
    table_max_micro_adjust: 3 # Limit search iterations near table
    enable_final_lock: true # Enable final adjustment phase
    enable_micro_adjust: false # Enable micro adjust search loop
    final_lock_enter_dist_th_m: 0.08 # Distance threshold to enter final lock
    final_lock_enter_yaw_th_rad: 0.10 # Heading threshold to enter final lock
    edge_settle_s: 0.80 # Settle time for edge confirmation
    dock_retry_limit: 2 # Retries limit upon docking failure
    dock_retry_backoff_s: 0.60 # Wait time before backing up
    search_target_init_hold_s: 0.25 # Pause duration before target search
    target_found_frames_to_confirm: 3 # Frames to lock target bounding box
    target_confirm_conf_th: 0.30 # Target trust threshold
    target_confirm_dwell_s: 0.0 # Minimum dwell time in confirm state
    target_confirm_min_s: 0.80 # Minimum search duration before confirming
    target_confirm_timeout_s: 3.00 # Target confirm search timeout
    target_confirm_lost_frames: 2 # Target loss frame count
    target_confirm_lost_hold_s: 1.20 # Target loss memory duration
    target_confirm_min_bbox_area: 0.0 # Minimum target box area ratio
    target_confirm_window_s: 1.50 # Sliding window size for target detection
    target_confirm_found_ratio_th: 0.50 # Ratio of successful detections in window
    target_lock_conf_th: 0.40 # Trust limit for locking target tag
    target_lock_found_ratio_th: 0.60 # Detections ratio required to lock tag
    target_lock_settle_s: 0.50 # Delay after locking target tag
    target_lock_stable_s: 1.20 # Target tag stable confirmation period
    target_lock_center_jitter_th: 0.08 # Tag position jitter filter threshold
    target_lock_lost_hold_s: 1.50 # Target tag loss memory duration
    target_locked_freeze_after_s: 1.00 # Tag freeze lock delay
    freeze_settle_s: 0.60 # Delay after freezing vehicle position
    edge_slide_pause_s: 0.20 # Settle delay between slide segments
    edge_slide_segment_s: 1.20 # Segment time during side slide motion
    edge_slide_dist_tolerance_m: 0.05 # Lateral alignment limit during slide
    edge_slide_fallback_state: "FINAL_LOCK" # State to fallback on slide fail
    edge_slide_pause_hold_s: 0.80 # Slide pause memory duration
    edge_slide_dist_out_of_range_hold_s: 0.80 # Slide error hold duration
    edge_slide_max_relock_attempts: 3 # Relock attempts limit
    edge_slide_relock_failure_is_fatal: true # Fail task on relock fail
    edge_slide_recover_timeout_s: 2.50 # Slide recover state timeout
    edge_slide_direct_fallback_to_controlled_approach: false # Skip relock
    table_edge_obs_max_age_ms: 500 # Obs packet age timeout in ms
    table_obs_stale_soft_ms: 300 # Warning duration for packet delays
    table_obs_stale_stop_ms: 500 # Stop vehicle if packet delay is large
    table_obs_stale_hard_ms: 800 # Disconnect control if delay is critical
    table_step_mode_enable: false # Move vehicle by discrete steps
    table_step_burst_ms: 150 # Duration of step velocity burst
    table_step_hold_until_new_obs: true # Wait for fresh packet to trigger step
    edge_follow_log_period_ms: 500 # Log update rate in edge tracking
    edge_follow_min_edge_conf: 0.60 # Edge trust limit
    edge_follow_min_edge_conf_table_edge_perception: 0.60 # Perception trust limit
    edge_follow_min_edge_conf_track_local: 0.20 # Tracking trust limit
    edge_follow_weak_edge_conf_track_local: 0.15 # Minimum local tracking trust limit
    edge_follow_strong_edge_conf_track_local: 0.35 # High confidence tracking limit
    edge_follow_low_conf_hold_s: 2.00 # Loss memory duration
    edge_follow_low_conf_exit_s: 3.00 # Timeout to exit tracking
    edge_follow_recover_conf_th: 0.25 # Reacquire threshold
    edge_identity_yaw_mismatch_rad: 0.15 # Yaw change filter threshold
    edge_identity_dist_mismatch_m: 0.04 # Dist change filter threshold
    edge_follow_stale_fallback_state: "FINAL_LOCK" # Fallback state
    edge_follow_stale_hold_s: 1.20 # Fallback delay
    edge_follow_track_local_edge_update_hz: 5.0 # Track local output frequency
    edge_handoff_min_s: 0.50 # Minimum handoff check duration
    edge_handoff_max_s: 1.00 # Maximum handoff check duration
    edge_handoff_samples: 3 # Sample count for handoff filter
    edge_relocate_enabled: true # Enable table relocation search
    max_edge_transitions_per_task: 3 # Limit relocations per task
    leave_edge_backoff_s: 0.80 # Backup time when leaving edge
    relocate_turn_s: 1.10 # Spin time during relocation search
    reacquire_timeout_s: 8.0 # Reacquire edge timeout
    next_table_dwell_s: 1.50 # Dwell time after docking
    tag_lost_frames_to_search: 4 # Tag frames dropped to trigger search
    return_lost_hold_s: 1.00 # Return tag loss memory duration
    return_min_dwell_s: 0.60 # Minimum duration in return state
    return_done_distance_m: 0.35 # Arrived threshold for return tag
    tag_arrived_frames_to_stop: 2 # Frames to declare arrival
    avoid_clear_frames_to_resume: 2 # Clear frames to resume path
    avoid_timeout_s: 4.0 # Obstacle avoid timeout
    avoid_retry_limit: 3 # Retries limit
    done_hold_s: 1.20 # Settle time after completion
    error_recovery_hold_s: 1.20 # Recovery wait time
    car_timeout_to_stop: true # Stop if serial communication times out
    car_fault_to_fail: true # Fail task if hardware reports error
    car_estop_to_stop: true # Stop vehicle if estop is pressed
    post_stop_ignore_s: 0.80 # Quiet time after e-stop/hardware stop
    vision_req_fail_to_stop: true # Stop if vision request fails
    vision_req_fail_threshold: 2 # Fail limit
    enable_pick_pipeline: false # Enable picker robot subsystem integration
    assume_grasp_success_for_test: false # Bypass hardware checks during test
  car:
    search_table_wz_radps: 0.10 # Rotational velocity to search for table
    fallback_align_turn_wz_min_radps: 0.10 # Minimum rotation velocity in fallback
