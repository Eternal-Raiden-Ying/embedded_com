    relocate_turn_wz_radps: 0.28 # Rotation speed for relocating table
    avoid_turn_wz_radps: 0.38 # Rotation speed for obstacle avoidance
    avoid_reverse_vx_mps: 0.12 # Reverse speed for obstacle avoidance
    cmd_hold_ms: 150 # Duration to hold motor commands in ms
    send_period_ms: 100 # Period of serial command send task
    uart_keepalive_hz: 10.0 # Frequency of serial keepalive pings
    min_uart_keepalive_hz: 7.0 # Disconnect limit for keepalive pings
