### === Mobile Gateway Configuration === ###
gateway:
  config_file: "" # Mobile gateway yaml override path
  runtime:
    project_root: "" # Root path of gateway stack
    repo_root: "" # Repository folder root
    log_dir: "" # Gateway logs folder
    log_file: "" # Active gateway log file
    runs_dir: "" # Task run histories directory
    pid_dir: "" # Folder for pid files
    pid_file: "" # Pid path
    stack_run_id: "" # Multi process stack execution identifier
    mode: "production" # Runtime execution mode
    log_level: "INFO" # Log severity filter level
    tick_hz: 10.0 # Gateway ticks loop frequency
    heartbeat_period_s: 1.0 # Heartbeat message send period
    heartbeat_log_interval_s: 30.0 # Frequency of heartbeat log outputs
    suppress_heartbeat_success_log: true # Avoid spamming console with success heartbeats
    enable_raw_mqtt_debug: false # Output raw MQTT messages to stdout
    enable_legacy_command_compat: true # Support legacy raw command mappings
    cmd_dedup_cache_size: 64 # Deduplicate incoming commands buffer size
    log_mode: "concise" # Concise or verbose logs
    log_enabled: true # Enable gateway logs
    status_stdout: true # Write status payload logs to console stdout
    stdin_enabled: false # Read tasks from terminal stdin
  backend:
    mode: "mock" # Backend gateway operations mode: mock, orchestrator_tcp, tcp_no_ack
    default_robot_id: "sc171_car_01" # Robot serial number identifier
    default_confidence: 0.99 # Mock confidence level default
    mock_step_interval_s: 0.20 # Period of mock state changes
    enforce_single_flight: true # Restrict execution to one active task
    observer_enabled: true # Monitor files and process status
    observer_poll_interval_s: 0.25 # File watchdog check rate
    orchestrator_runs_dir: "" # Orchestrator runs output path
    state_blocks_path: "" # State blocks status output path
    state_block_log_mode: "summary" # Detail of status report logging
    state_block_log_period_s: 1.0 # Status report logging frequency
    stop_cooldown_s: 1.0 # Cooldown wait duration after stop command
  mqtt:
    enabled: false # Enable cloud MQTT bridge
    transport: "websocket" # Bridge protocol transport mode: websocket, tcp
    use_tls: true # Apply SSL/TLS connections
    broker_host: "" # MQTT server broker domain address
    broker_port: 443 # Port number of bridge connection
    websocket_path: "/mqtt" # WS path
    username: "" # Auth user credentials
    password: "" # Auth user credentials
    client_id: "sc171_car_01" # MQTT bridge connection identifier
    robot_id: "sc171_car_01" # Robot target serial number
    cmd_qos: 1 # Quality of service grade for commands
    ack_qos: 1 # Quality of service grade for acknowledgments
    status_qos: 0 # Quality of service grade for status
    heartbeat_qos: 0 # Quality of service grade for heartbeat
    retain_status: false # Retain flag for status updates
    retain_heartbeat: false # Retain flag for heartbeat updates
    keepalive_s: 60 # Connection keepalive ping interval in seconds
    connect_timeout_s: 5.0 # Timeout duration of connection attempts
    topics:
      cmd: "robot/sc171_car_01/cmd" # CMD topic path
      ack: "robot/sc171_car_01/ack" # ACK topic path
      status: "robot/sc171_car_01/status" # Status topic path
      heartbeat: "robot/sc171_car_01/heartbeat" # Heartbeat topic path
  command_in:
    transport: "uds" # Gateway incoming command IPC mode
    ipc_socket_path: "/tmp/robot_stack/mobile_gateway_cmd.sock" # Socket file path
  status_out:
    transport: "disabled" # Gateway outgoing status IPC mode
    ipc_socket_path: "/tmp/robot_stack/mobile_gateway_status.sock" # Socket file path
    send_mode: "oneshot" # Socket persistence mode
  orchestrator_task_cmd_out:
    transport: "uds" # Gateway outgoing orchestrator command IPC mode
    ipc_socket_path: "/tmp/robot_stack/task_cmd.sock" # Socket file path
    send_mode: "oneshot" # Socket persistence mode
  orchestrator_task_ack_in:
    transport: "disabled" # Gateway incoming orchestrator ack IPC mode
    ipc_socket_path: "/tmp/robot_stack/mobile_gateway_ack.sock" # Socket file path

### === Online Edge Detector Configuration === ###
online_edge:
  runtime:
    project_root: "" # Directory of online edge detector module
    log_dir: "" # Online edge logs folder
    log_file: "" # Active log path
    runs_dir: "" # Runs output path
    pid_dir: "" # Folder for pid files
    pid_file: "" # Pid file path
    stack_run_id: "" # Stack execution run ID
    loop_hz: 10.0 # Frequency of main detector tick loop
    preview: true # Enable/disable OpenCV display windows
    save_snapshot_period_s: 0.0 # Snapshot capture period (0 to disable)
    snapshot_dir: "" # Folder to store snapshot images
    log_mode: "concise" # Concise or verbose logs
    log_enabled: true # Enable logging output
  output:
    transport: "disabled" # Observation output transport mode: uds, tcp, disabled
    host: "127.0.0.1" # Host address
    port: 9102 # Port number
    uds_path: "/tmp/robot_stack/table_edge_obs.sock" # Socket file path
    send_interval_s: 0.20 # Minimum period between packets
  camera:
    bag_path: "" # Replays bag file if not empty
    align_to_color: true # Align depth frames to color frames FOV
    depth_enabled: true # Enable depth stream
    depth_width: 424 # Depth sensor width
    depth_height: 240 # Depth sensor height
    depth_fps: 15 # Depth sensor frame rate
    color_enabled: true # Enable color RGB stream
    color_width: 1280 # Color sensor width
    color_height: 720 # Color sensor height
    color_fps: 15 # Color sensor frame rate
  detector:
    calib_json: "" # Path to calib.json camera metrics file
    target_dist_m_override: 0.50 # Override target distance parameter if > 0
    roi_y0: 100 # ROI vertical start pixel
    roi_y1: 380 # ROI vertical end pixel
    roi_x0: 100 # ROI horizontal start pixel
    roi_x1: 540 # ROI horizontal end pixel
    z_min: 0.2 # Minimum distance to filter depth points
    z_max: 2.0 # Maximum distance to filter depth points
    table_y_min: -0.2 # Table bounding box width minimum boundary
    table_y_max: 0.2 # Table bounding box width maximum boundary
    min_all_points: 1000 # Minimum total points to execute fit
    min_table_points: 500 # Minimum table segment points to fit
    ransac_iters: 120 # Maximum iterations for RANSAC line fitting
    residual_threshold_m: 0.05 # Max residual distance to classify inliers
    random_seed: 42 # Seed for random number generator
    depth_median_ksize: 5 # Median filter kernel size
    plane_only_mode: true # Skip crease line detection
    enable_crease_line: false # Enable crease line search
    trend_window_px: 12 # Sliding window size to calculate depth gradients
    trend_col_step_px: 6 # Column stride for gradient search
    trend_min_valid_ratio: 0.70 # Minimum gradient ratio to keep candidate
    trend_min_slope_delta: 0.0025 # Minimum slope delta for table edge crease
    trend_min_candidate_count: 35 # Minimum candidates required to trigger fit
    trend_topk_per_col: 3 # Maximum candidates selected per column
    upper_line_y_norm_min: 0.12 # Vertical bounds normalized for top crease line search
    upper_line_y_norm_max: 0.62 # Vertical bounds normalized for top crease line search
    lower_line_y_norm_min: 0.42 # Vertical bounds normalized for bottom crease line search
    lower_line_y_norm_max: 0.92 # Vertical bounds normalized for bottom crease line search
    line_min_x_span_m: 0.18 # Minimum horizontal span of candidate line
    line_max_residual_m: 0.035 # Maximum residual allowed for crease line
    line_select_min_confidence: 0.35 # Trust threshold for line fit
    line_select_min_x_span_m: 0.16 # Minimum horizontal span of selected line
    line_select_max_residual_m: 0.040 # Max residual to select candidate line
    line_select_max_plane_yaw_diff_rad: 0.22 # Max angle difference between crease and plane
    line_plane_boundary_soft_dist_px: 14.0 # Distance threshold to reward line/plane overlap
    line_plane_boundary_max_dist_px: 32.0 # Maximum distance allowed to associate line/plane
    line_plane_boundary_weight: 0.20 # Weight factor for boundary alignment overlap
    line_object_like_max_score: 0.68 # Threshold to reject objects like lines
    line_object_like_penalty_weight: 0.25 # Score penalty for object like fits
    plane_min_inliers: 220 # Minimum inliers to fit plane
    plane_min_x_span_m: 0.20 # Minimum horizontal size of fit plane
    plane_max_residual_m: 0.035 # Maximum residual allowed for plane fit
    front_plane_min_score: 0.45 # Minimum score to trust plane segment
    front_plane_min_area_ratio: 0.03 # Minimum plane area relative to ROI size
    front_plane_min_x_span_m: 0.20 # Minimum horizontal size of front plane
    front_plane_max_residual_m: 0.035 # Maximum residual allowed for front plane
    plane_max_abs_normal_y: 0.70 # Normal Y threshold filter
    plane_min_abs_normal_z: 0.25 # Normal Z threshold filter
    front_face_min_area_ratio: 0.03 # Area ratio representing front table face
    fusion_yaw_consistency_rad: 0.18 # Consistency threshold between line and plane
    table_geometry_approach_score: 0.35 # Approach score threshold in fusion
    table_geometry_alignment_score: 0.55 # Alignment score threshold in fusion
    table_geometry_stop_score: 0.70 # Stop score threshold in fusion
    front_plane_score_weight: 0.35 # Weight of front plane in fusion
    line_score_weight: 0.25 # Weight of crease line in fusion
    plane_line_consistency_weight: 0.15 # Weight of angle consistency in fusion
    roi_boundary_score_weight: 0.10 # Weight of boundary margin in fusion
    temporal_score_weight: 0.15 # Weight of temporal stability in fusion
    roi_boundary_margin_px: 8 # Margin in pixels from ROI border
    roi_boundary_max_touch_ratio: 0.25 # Limit of margin touching points ratio
