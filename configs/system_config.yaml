    table_coarse_align_vy_min_mps: 0.000 # Minimum lateral velocity in coarse align
    table_coarse_align_vy_max_mps: 0.000 # Maximum lateral velocity in coarse align
    table_coarse_align_wz_min_radps: 0.080 # Minimum rotation velocity in coarse align
    table_coarse_align_wz_max_radps: 0.150 # Maximum rotation velocity in coarse align
    table_controlled_vx_min_mps: 0.020 # Minimum forward velocity in controlled approach
    table_controlled_vx_max_mps: 0.035 # Maximum forward velocity in controlled approach
    table_controlled_vy_min_mps: 0.000 # Minimum lateral velocity in controlled approach
