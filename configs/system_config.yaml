    table_controlled_wz_min_radps: 0.000 # Minimum rotation velocity in controlled approach
    table_controlled_wz_max_radps: 0.000 # Maximum rotation velocity in controlled approach
    table_approach_safe_vx_mps: 0.020 # Safe forward velocity limit in approach
    table_approach_max_vx_mps: 0.035 # Maximum forward velocity limit in approach
    table_approach_yaw_deadband_rad: 0.08 # Deadband for heading corrections
    table_approach_yaw_realign_rad: 0.16 # Heading error forcing stop and align
    table_approach_allow_wz: false # Enable heading correction during approach
    table_approach_allow_vy: false # Enable lateral correction during approach
    table_pose_missing_safe_vx_mps: 0.020 # Safe speed on brief perception loss
    table_pose_missing_max_hold_s: 3.0 # Duration to keep moving on loss
    table_final_lock_vx_min_mps: 0.000 # Minimum forward speed in final lock
    table_final_lock_vx_max_mps: 0.008 # Maximum forward speed in final lock
    table_final_lock_vy_min_mps: 0.006 # Minimum lateral speed in final lock
    table_final_lock_vy_max_mps: 0.012 # Maximum lateral speed in final lock
    table_final_lock_wz_min_radps: 0.010 # Minimum rotation speed in final lock
    table_final_lock_wz_max_radps: 0.025 # Maximum rotation speed in final lock
    table_vx_deadband_mps: 0.004 # Forward speed deadband
    table_vy_deadband_mps: 0.001 # Lateral speed deadband
    table_wz_deadband_radps: 0.006 # Rotation speed deadband
    table_stage_a_wz_radps: 0.04 # Alignment phase angular velocity
    table_stage_b_vx_max_mps: 0.03 # Approach phase forward velocity limit
    table_stage_c_vx_max_mps: 0.03 # Docking phase forward velocity limit
    table_stage_c_vx_min_mps: 0.0 # Docking phase minimum forward velocity
    table_min_forward_dist_err_m: 0.07 # Minimum distance to target
    table_vx_mps_min: 0.040 # Base forward speed
    table_vx_mps_max: 0.100 # Peak forward speed
    table_vx_kp_mps_per_m: 0.30 # Forward speed gain factor
    table_yaw_slow_th_rad: 0.12 # Heading error requiring deceleration
    table_yaw_stop_th_rad: 0.45 # Heading error forcing stop
    table_near_dist_err_th_m: 0.10 # Near table distance threshold
    table_vy_max_mps: 0.067 # Maximum lateral velocity
    table_wz_view_max_radps: 0.05 # Maximum rotation velocity during tag search
    table_wz_plane_max_radps: 0.06 # Maximum rotation velocity during edge search
