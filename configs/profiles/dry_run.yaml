profile: "dry_run"
runtime_overrides:
  vision:
    req_in:
      transport: "disabled"
    obs_out:
      transport: "disabled"
  orchestrator:
    runtime:
      config_profile: "dry_run"
    serial:
      port: "DRY_RUN"
      dry_run: true
      readback_enabled: false
    control:
      vision_req_fail_to_stop: false
    task_cmd_in:
      transport: "uds"
      ipc_socket_path: "/tmp/robot_stack/task_cmd.sock"
    task_ack_out:
      transport: "disabled"
    vision_obs_in:
      transport: "tcp"
      tcp_host: "127.0.0.1"
      tcp_port: 19103
    vision_req_out:
      transport: "disabled"
    tts_event_out:
      transport: "disabled"
  gateway:
    backend:
      mode: "tcp_no_ack"
    command_in:
      transport: "http"
      tcp_host: "0.0.0.0"
      tcp_port: 9001
    status_out:
      transport: "disabled"
    orchestrator_task_cmd_out:
      transport: "uds"
      ipc_socket_path: "/tmp/robot_stack/task_cmd.sock"
    orchestrator_task_ack_in:
      transport: "disabled"
  online_edge:
    output:
      transport: "disabled"
