car_cmd:
  # Transport/keepalive only. Motion speeds are physical values generated upstream.
  send_period_ms: 100
  uart_keepalive_hz: 10.0
  min_uart_keepalive_hz: 7.0
  hold_ms: 150
  motion_hold_ms: 400
  hard_stale_stop_ms: 800
  soft_stale_hold_enable: true
  max_vx_mps: 1.0
  max_vy_mps: 1.0
  max_wz_radps: 1.0
  stop_on_state_enter: false
