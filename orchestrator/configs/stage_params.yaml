final_lock:
  # SC171 table docking defaults. Override per run with ORCH_TABLE_* env vars.
  yaw_abs_th: 0.25
  dist_abs_th_m: 0.05
  edge_conf_th: 0.55
  stable_ms: 500
  timeout_ms: 14000
  target_dist_m: 0.50
  stop_margin_m: 0.05
  settle_ms: 500
  stable_frames: 5
  required_ready_obs: 3
  window_ms: 1000
  max_consecutive_lost: 2
  soft_stale_hold: true
  max_micro_adjust: 3

table_docking:
  # Normal staged docking: allow FINAL_LOCK, but keep jog/micro-adjust disabled by default.
  enable_final_lock: true
  enable_micro_adjust: false
  final_lock_enter_dist_th_m: 0.08
  final_lock_enter_yaw_th_rad: 0.10
  align_to_approach_yaw_rad: 0.08
  approach_to_align_yaw_rad: 0.16
  align_to_approach_stable_obs: 2
  approach_to_align_stable_obs: 2
  coarse_align_min_dwell_s: 0.8
  controlled_approach_min_dwell_s: 0.8

controlled_approach:
  target_dist_m: 0.015
  max_vx_norm: 0.28
  max_wz_norm: 0.32
  dist_kp: 1.4
  yaw_kp: 1.8
  fov_soft_th: 0.25
  fov_hard_th: 0.40
  stage_a_wz_norm: 0.04
  stage_b_vx_max_norm: 0.03
  stage_c_vx_max_norm: 0.03
  view_vy_max_norm: 0.01
  view_wz_max_norm: 0.05
  plane_wz_max_norm: 0.06

# 如何快速调整桌边靠近速度:
# - 想让小车前进更快：改 table_docking_motion.controlled_approach.vx_max_mps / vx_min_mps。
# - 想让最终停车更稳：降低 table_docking_motion.final_lock.vx_max_mps / wz_max_radps。
# - 想让对齐更快：提高 table_docking_motion.coarse_align.wz_max_radps 和 vy_max_mps。
# - 想减少抖动：增大 deadband 或降低 min speed。
# - 想保守测试：整体乘以 0.5。
# - 想激进测试：整体乘以 1.3，但不要超过当前 max 的安全上限。
table_docking_motion:
  approach_safe_vx_mps: 0.020
  approach_max_vx_mps: 0.035
  approach_yaw_deadband_rad: 0.08
  approach_yaw_realign_rad: 0.16
  approach_allow_wz: false
  approach_allow_vy: false
  pose_missing_safe_vx_mps: 0.020
  pose_missing_max_hold_s: 3.0
  coarse_align:
    vx_max_mps: 0.000
    vy_min_mps: 0.000
    vy_max_mps: 0.000
    wz_min_radps: 0.080
    wz_max_radps: 0.150
  controlled_approach:
    vx_mps: 0.020
    vx_min_mps: 0.020
    vx_max_mps: 0.035
    vy_min_mps: 0.000
    vy_max_mps: 0.000
    wz_min_radps: 0.000
    wz_max_radps: 0.000
    allow_vy: false
    allow_wz: false
  final_lock:
    vx_min_mps: 0.000
    vx_max_mps: 0.008
    vy_min_mps: 0.006
    vy_max_mps: 0.012
    wz_min_radps: 0.010
    wz_max_radps: 0.025
  deadband:
    vx_mps: 0.004
    vy_mps: 0.001
    wz_radps: 0.006

edge_slide_search:
  slide_vy_norm: 0.14
  weak_slide_vy_norm: 0.05
  max_vx_correction_norm: 0.08
  max_wz_correction_norm: 0.18
  dist_kp: 1.0
  yaw_kp: 1.0
  strong_edge_conf_track_local: 0.35
  weak_edge_conf_track_local: 0.15
  keep_dist_tolerance_m: 0.05
  dist_out_of_range_hold_ms: 800
  max_relock_attempts: 3
  relock_failure_is_fatal: true
  pause_hold_ms: 800
  recover_timeout_ms: 2500
  edge_lost_hold_ms: 1200
  fallback_state: FINAL_LOCK
  direct_fallback_to_controlled_approach: false
  min_dwell_ms: 800

edge_follow:
  table_edge_obs_max_age_ms: 500
  table_obs_stale_soft_ms: 300
  table_obs_stale_stop_ms: 500
  table_obs_stale_hard_ms: 800
  table_step_mode_enable: false
  table_step_burst_ms: 150
  table_step_hold_until_new_obs: true
  min_edge_conf: 0.60
  min_edge_conf_table_edge_perception: 0.60
  min_edge_conf_track_local: 0.20
  weak_edge_conf_track_local: 0.15
  strong_edge_conf_track_local: 0.35
  low_conf_hold_ms: 2000
  low_conf_exit_ms: 3000
  recover_conf_th: 0.25
  identity_yaw_mismatch_rad: 0.15
  identity_dist_mismatch_m: 0.04
  log_period_ms: 500
  track_local_edge_update_hz: 5
  handoff_min_ms: 500
  handoff_max_ms: 1000
  handoff_samples: 3
  stale_hold_ms: 1200
  stale_fallback_state: FINAL_LOCK

target_confirm:
  confirm_conf_th: 0.30
  confirm_enter_frames: 3
  confirm_min_ms: 800
  confirm_timeout_ms: 3000
  confirm_lost_hold_ms: 1200
  window_ms: 1500
  confirm_found_ratio_th: 0.50
  min_bbox_area: 0.002

target_locked:
  lock_conf_th: 0.40
  lock_found_ratio_th: 0.60
  lock_stable_ms: 1200
  center_jitter_th: 0.08
  locked_lost_hold_ms: 1500
  freeze_after_locked_ms: 1000
