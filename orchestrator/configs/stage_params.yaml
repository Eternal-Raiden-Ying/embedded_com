# Stage-level behavior and absolute-speed motion parameters.
# All motion values in this file are physical units:
#   vx/vy: m/s, wz: rad/s. There are no normalized speed parameters.

final_lock:
  yaw_abs_th: 0.25
  dist_abs_th_m: 0.05
  edge_conf_th: 0.55
  stable_ms: 500
  timeout_ms: 14000
  target_dist_m: 0.30
  stop_margin_m: 0.05
  settle_ms: 500
  stable_frames: 5
  required_ready_obs: 3
  window_ms: 1000
  max_consecutive_lost: 2
  soft_stale_hold: true
  max_micro_adjust: 3

table_docking:
  enable_final_lock: true
  enable_micro_adjust: false
  final_lock_enter_dist_th_m: 0.08
  final_lock_enter_yaw_th_rad: 0.10
  align_to_approach_yaw_rad: 0.08
  approach_to_align_yaw_rad: 0.16
  align_to_approach_stable_obs: 2
  approach_to_align_stable_obs: 2
  coarse_align_min_dwell_s: 0.8
  controlled_approach_min_dwell_s: 0.8
  near_slow_max_vx_mps: 0.008
  near_slow_max_vy_mps: 0.0025
  depth_envelope_stop_p10_m: 0.55
  depth_envelope_slow_p10_m: 0.65
  depth_envelope_mid_p10_m: 0.80
  depth_envelope_slow_vx_mps: 0.008
  depth_envelope_mid_vx_mps: 0.012
  bbox_track_forward_enabled: true
  bbox_track_forward_vx_mps: 0.020
  bbox_track_forward_max_vx_mps: 0.030
  bbox_track_forward_center_band: 0.30
  far_bbox_track_vx_mps: 0.025
  bbox_track_forward_min_hold_ms: 800
  bbox_track_forward_max_wz_radps: 0.06
  edge_readiness_enabled: true
  edge_readiness_enter_score: 0.65
  edge_readiness_exit_score: 0.35
  edge_readiness_rise: 0.15
  edge_readiness_decay: 0.10
  edge_readiness_min_inliers: 30
  edge_readiness_yaw_max_rad: 0.35
  edge_handoff_min_hold_ms: 800
  edge_handoff_forward_vx_mps: 0.018
  forward_commit_min_s: 1.8
  far_forward_commit_min_s: 2.0
  stop_after_table_docking: true
  lateral_enabled: true
  lateral_vy_max_mps: 0.015
  lateral_deadband_norm: 0.035
  lateral_kp: 0.065
  lateral_target_center_x_norm: 0.5
  lateral_owner_default: none

yolo_table:
  yolo_table_control_enable: true
  yolo_table_conf_min: 0.25
  yolo_table_edge_stable_frames: 5
  edge_trusted_stable_frames: 5
  edge_trusted_min_conf: 0.60
  edge_trusted_max_residual: 0.05
  edge_trusted_min_support_count: 0
  edge_trusted_min_inlier_count: 0
  edge_trusted_min_x_span_m: 0.0
  edge_trusted_max_background_penalty: 0.0
  yolo_table_near_dist_m: 0.45
  yolo_forward_vx_mps: 0.015
  yolo_yaw_gain: 0.20
  yolo_max_wz_radps: 0.06
  yolo_table_lost_to_search_frames: 8
  rotate_search_wz_radps: 0.10
  rotate_search_timeout_s: 10.0
  rotate_require_edge_stable_frames: 5
  rotate_yaw_threshold_rad: 0.20
  yolo_edge_conflict_block_rotate: true

# Perception/docking PID thresholds. Speeds here are physical caps, not normalized values.
controlled_approach:
  target_dist_m: 0.015
  max_vx_mps: 0.035
  max_wz_radps: 0.150
  dist_kp: 1.4
  yaw_kp: 1.8
  fov_soft_th: 0.25
  fov_hard_th: 0.40
  stage_a_wz_radps: 0.080
  stage_b_vx_max_mps: 0.020
  stage_c_vx_max_mps: 0.035
  view_vy_max_mps: 0.000
  view_wz_max_radps: 0.050
  plane_wz_max_radps: 0.150

# Motion profiles used by table approach / align / final lock.
table_docking_motion:
  approach_safe_vx_mps: 0.020
  approach_max_vx_mps: 0.035
  approach_yaw_deadband_rad: 0.08
  approach_yaw_realign_rad: 0.16
  edge_hard_rotate_only_yaw_rad: 0.45
  edge_hard_yaw_rotate_only_frames: 3
  edge_hard_yaw_rotate_only_ms: 350
  perception_warmup_s: 1.0
  approach_allow_wz: true
  approach_allow_vy: false
  pose_missing_safe_vx_mps: 0.020
  pose_missing_max_hold_s: 3.0
  coarse_align:
    vx_max_mps: 0.000
    vy_min_mps: 0.000
    vy_max_mps: 0.000
    wz_min_radps: 0.080
    wz_max_radps: 0.150
  controlled_approach:
    vx_mps: 0.020
    vx_min_mps: 0.020
    vx_max_mps: 0.035
    vy_min_mps: 0.000
    vy_max_mps: 0.000
    wz_min_radps: 0.000
    wz_max_radps: 0.120
    allow_vy: false
    allow_wz: true
  final_lock:
    vx_min_mps: 0.000
    vx_max_mps: 0.008
    vy_min_mps: 0.006
    vy_max_mps: 0.012
    wz_min_radps: 0.010
    wz_max_radps: 0.025
  deadband:
    vx_mps: 0.004
    vy_mps: 0.001
    wz_radps: 0.006

edge_slide_search:
  slide_vy_mps: 0.010
  weak_slide_vy_mps: 0.006
  max_vx_correction_mps: 0.008
  max_wz_correction_radps: 0.080
  dist_kp: 1.0
  yaw_kp: 1.0
  strong_edge_conf_track_local: 0.35
  weak_edge_conf_track_local: 0.15
  keep_dist_tolerance_m: 0.05
  dist_out_of_range_hold_ms: 800
  max_relock_attempts: 3
  relock_failure_is_fatal: true
  pause_hold_ms: 800
  recover_timeout_ms: 2500
  edge_lost_hold_ms: 1200
  fallback_state: FINAL_LOCK
  direct_fallback_to_controlled_approach: false
  min_dwell_ms: 800

edge_follow:
  table_edge_obs_max_age_ms: 500
  table_obs_stale_soft_ms: 300
  table_obs_stale_stop_ms: 500
  table_obs_stale_hard_ms: 800
  table_step_mode_enable: false
  table_step_burst_ms: 150
  table_step_hold_until_new_obs: true
  min_edge_conf: 0.60
  min_edge_conf_table_edge_perception: 0.60
  min_edge_conf_track_local: 0.20
  weak_edge_conf_track_local: 0.15
  strong_edge_conf_track_local: 0.35
  low_conf_hold_ms: 2000
  low_conf_exit_ms: 3000
  recover_conf_th: 0.25
  identity_yaw_mismatch_rad: 0.15
  identity_dist_mismatch_m: 0.04
  log_period_ms: 500
  track_local_edge_update_hz: 5
  handoff_min_ms: 500
  handoff_max_ms: 1000
  handoff_samples: 3
  stale_hold_ms: 1200
  stale_fallback_state: FINAL_LOCK

target_confirm:
  confirm_conf_th: 0.30
  confirm_enter_frames: 3
  confirm_min_ms: 800
  confirm_timeout_ms: 3000
  confirm_lost_hold_ms: 1200
  window_ms: 1500
  confirm_found_ratio_th: 0.50
  min_bbox_area: 0.002

target_locked:
  lock_conf_th: 0.40
  lock_found_ratio_th: 0.60
  lock_stable_ms: 1200
  center_jitter_th: 0.08
  locked_lost_hold_ms: 1500
  freeze_after_locked_ms: 1000
