# VISTA 现场调参入口。
# board_config.py / schema.py 只保留默认值和装配逻辑；明天现场优先改这个 YAML。
# 如果终端里设置了对应环境变量，环境变量仍会临时覆盖这里的值。

runtime:
  # 主循环和观测发送频率。
  loop_hz: 8.0
  send_hz: 5.0
  track_local_send_hz: 8.0

  # 请求过期和热待机。
  stale_req_s: 3.0
  hot_standby_s: 30.0
  keep_preview_after_stop: true
  keep_model_hot_in_standby: true
  enable_infer_during_hot_standby: false

  # 日志和控制台。
  log_mode: concise
  log_enabled: true
  debug: false
  heartbeat_enabled: true
  heartbeat_interval_s: 2.0
  heartbeat_console: false
  console_mode: operator
  operator_summary_interval_s: 1.0
  ipc_console: false

camera:
  # 全局相机 FPS 上限。
  max_fps: 30

  rgb:
    # RGB 摄像头设备号。A1 上常见是 "6"，必要时按 /dev/video* 调整。
    source: "6"
    in_w: 1280
    in_h: 720
    out_w: 640
    out_h: 640
    in_format: YUY2
    format: BGR
    fps: 30

    # 默认 RGB crop。桌子在画面偏左/偏右/偏下时，优先先调 mode_profiles 里的模式 crop。
    crop_x: 280
    crop_y: 0
    crop_w: 720
    crop_h: 720

    auto_exposure: true
    exposure: null
    brightness: null

  depth:
    # 深度摄像头设备号。A1 上常见是 "2"。
    source: "2"
    width: 424
    height: 240
    fps: 15

  grey:
    source: "4"
    in_w: 640
    in_h: 480
    out_w: 640
    out_h: 480
    in_format: GRAY8
    format: BGR
    fps: 30
    crop_x: 0
    crop_y: 0
    crop_w: 0
    crop_h: 0

model:
  # 可选：yolov7_detect、yolov8s_seg、yolo26s_seg、yolo26s_seg_qnn216。
  active_model: yolov7_detect

  profiles:
    yolov7_detect:
      # target_model 留空或删除表示使用 board_config.py 默认模型路径。
      target_model: null
      width: 640
      height: 640
      conf_thres: 0.25
      iou_thres: 0.45
      class_num: 80
      predictor_type: detect
      model_backend: qnn

    yolov8s_seg:
      target_model: null
      width: 640
      height: 640
      conf_thres: 0.45
      iou_thres: 0.45
      class_num: 80
      predictor_type: segment
      model_backend: qnn

    yolo26s_seg:
      target_model: null
      width: 640
      height: 640
      conf_thres: 0.25
      iou_thres: 0.15
      class_num: 20
      predictor_type: segment
      model_backend: qnn

debug:
  preview: true
  draw_boxes: true
  draw_masks: false

  # 桌边深度调试日志。打开后低频输出 [EDGE_DBG]。
  edge_debug_enabled: false
  edge_debug_period_s: 1.0

  # YOLO table detection 调试日志。打开后低频输出 [TABLE_DET]。
  table_det_enabled: false
  table_det_min_conf: 0.25
  table_det_center_tol: 0.12

table_edge:
  # 可选：""、center_mid、center_lower、full_width_lower。
  # 默认固定使用画面中下区域；需要动态 ROI 时可临时改回 ""。
  roi_preset: center_lower
  static_roi_enabled: false
  # 可选：full、fast_plane_only。默认保留 full 检测路径。
  detector_mode: full
  fast_plane_stride: 4
  # fast_plane_only 使用固定安装位姿把稀疏深度点转换到机器人坐标：
  # X=左右，Y=向前，Z=离地高度。pitch 为相机光轴向下俯仰角。
  camera_pitch_deg: 15.0
  camera_height_m: 0.70
  camera_roll_deg: 0.0
  camera_yaw_deg: 0.0
  table_height_m: 0.40
  front_face_z_min_m: 0.03
  front_face_z_max_m: 0.43
  min_vertical_z_span_m: 0.12
  min_vertical_support_points: 3
  x_bin_width_m: 0.04
  y_cluster_bin_m: 0.04
  min_front_face_columns: 3
  min_front_face_x_span_m: 0.07
  front_cluster_gap_m: 0.10
  max_yaw_abs_rad: 0.75

  # 桌边检测频率。
  target_hz: 10.0
  update_hz: 10.0
  preview_hz: 2.0
  track_local_update_hz: 5.0
  track_local_light_edge: true
  track_local_edge_stride: 4
  enable_yolo_in_plane_only: false
  save_debug_frames: false
  profile_log_interval_s: 2.0

preview:
  # 可选 layout 见 preview/manager 和 opencv_sink 支持项。
  mode_layouts:
    IDLE: rgb_minimal
    DEPTH_PERCEPTION: rgb_depth_edge
    TABLE_EDGE_PERCEPTION: rgb_depth_edge
    TRACK_LOCAL: rgb_yolo_edge_overlay
    MICRO_ADJUST: rgb_minimal
    GRASP_REMOTE: rgb_depth_edge
    IDLE_HOT: rgb_hot_preview

  debug_four_panel_in_track_local: false
  show_edge_overlay_in_track_local: true
  show_age_ms: true
  clear_overlay_on_mode_switch: true

mode_profiles:
  # DEPTH_PERCEPTION 是否也打开 RGB + YOLO table bbox。
  table_bbox:
    enabled: false
    model: yolov7_detect

  modes:
    TRACK_LOCAL:
      # 可选相机写法：rgb,depth 或 [rgb, depth]。
      enabled_cameras: [rgb, depth]
      predictor_enabled: true
      predictor_model: yolov7_detect
      preview_enabled: true
      preview_layout: rgb_yolo_edge_overlay
      release_cooldown_s: 2.0
      rgb:
        fps: 24
        crop_x: 280
        crop_y: 0
        crop_w: 720
        crop_h: 720

    TABLE_EDGE_PERCEPTION:
      enabled_cameras: [rgb, depth]
      predictor_enabled: true
      predictor_model: yolov7_detect
      preview_enabled: true
      preview_layout: rgb_depth_edge
      release_cooldown_s: 2.0
      rgb:
        fps: 24
        crop_x: 280
        crop_y: 0
        crop_w: 720
        crop_h: 720

    MICRO_ADJUST:
      enabled_cameras: [rgb]
      predictor_enabled: true
      predictor_model: yolov7_detect
      preview_enabled: true
      preview_layout: rgb_minimal
      release_cooldown_s: 2.0
      rgb:
        fps: 30
        crop_x: 320
        crop_y: 40
        crop_w: 640
        crop_h: 640

    GRASP_REMOTE:
      enabled_cameras: [rgb, depth]
      predictor_enabled: false
      predictor_model: null
      preview_enabled: true
      preview_layout: rgb_depth_edge
      release_cooldown_s: 3.0
      rgb:
        fps: 15
        crop_x: 280
        crop_y: 0
        crop_w: 720
        crop_h: 720

    IDLE_HOT:
      enabled_cameras: [rgb]
      predictor_enabled: false
      predictor_model: null
      preview_enabled: true
      preview_layout: rgb_hot_preview
      release_cooldown_s: 5.0
      rgb:
        fps: 10
        crop_x: 280
        crop_y: 0
        crop_w: 720
        crop_h: 720

ipc:
  req_in:
    transport: tcp
    host: 127.0.0.1
    port: 9003
    uds_path: /tmp/robot_stack/vision_req.sock
  obs_out:
    transport: tcp
    host: 127.0.0.1
    port: 9002
    uds_path: /tmp/robot_stack/vision_obs.sock
